name: Test

on:
  workflow_call:
    inputs:
      language:
        description: 'Programming language (go, python, or swift)'
        required: true
        type: string
      runner:
        description: 'Override runner image (default: macos-latest for swift, ubuntu-latest otherwise)'
        required: false
        type: string

jobs:
  test:
    runs-on: ${{ inputs.runner || (inputs.language == 'swift' && 'macos-latest' || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        if: inputs.language == 'go'
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version-file: .tool-versions
          install-only: true

      - name: Set up Python (uv)
        if: inputs.language == 'python'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install SwiftLint
        if: inputs.language == 'swift'
        run: |
          SWIFTLINT_VERSION=$(awk '/^swiftlint / {print $2}' .tool-versions)
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -q /tmp/swiftlint.zip -d /usr/local/bin

      - name: Run tests
        run: make test-all
